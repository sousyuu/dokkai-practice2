// ===== STATE =====
let state = {
  screen: 'login',
  studentId: '',
  name: '',
  currentSection: 0,
  currentQuestion: 0,
  selectedAnswer: null,
  answers: [[], [], []],
  scores: [0, 0, 0],
};

const COLORS = ['#4a6fe3', '#2eaab8', '#e3714a'];
const BG_COLORS = ['#eef2ff', '#eafbfd', '#fff4f0'];

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'login')          app.innerHTML = renderLogin();
  else if (state.screen === 'section-intro') app.innerHTML = renderSectionIntro();
  else if (state.screen === 'question')  app.innerHTML = renderQuestion();
  else if (state.screen === 'results')   app.innerHTML = renderResults();
  attachEvents();
}

// ---------- LOGIN ----------

        <div style="font-size:14px;font-weight:600;margin-bottom:7px;color:#444;">學號 <span style="color:#e05555;">*</span></div>

          style="width:100%;padding:13px 16px;border:1.5px solid #dde3f0;border-radius:10px;font-size:15px;color:#333;outline:none;"
          onfocus="this.style.borderColor='#4a6fe3'" onblur="this.style.borderColor='#dde3f0'">

// ---------- SECTION INTRO ----------
function renderSectionIntro() {
  const s = sections[state.currentSection];
  const c = COLORS[state.currentSection];
  const icons = ['📝', '💬', '📄'];
  return `
  <div style="min-height:100vh;background:#f0f4f8;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div style="background:white;border-radius:20px;padding:52px 40px;width:100%;max-width:460px;box-shadow:0 4px 28px rgba(74,111,227,0.13);text-align:center;">
      <div style="font-size:52px;margin-bottom:16px;">${icons[state.currentSection]}</div>
      <div style="font-size:13px;color:#aaa;margin-bottom:8px;letter-spacing:2px;text-transform:uppercase;">Next Section</div>
      <h2 style="font-size:44px;font-weight:800;color:${c};margin-bottom:8px;letter-spacing:2px;">${s.name}</h2>
      <div style="font-size:15px;color:#777;margin-bottom:10px;">${s.description}</div>
      <div style="display:inline-block;background:${BG_COLORS[state.currentSection]};color:${c};font-size:14px;font-weight:600;padding:6px 20px;border-radius:20px;margin-bottom:44px;">全 10 問</div>
      <button id="startSectionBtn"
        style="width:100%;padding:16px;background:${c};color:white;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px;">
        スタート →
      </button>
    </div>
  </div>`;
}

// ---------- QUESTION ----------
function renderQuestion() {
  const s = sections[state.currentSection];
  const q = s.questions[state.currentQuestion];
  const qNum = state.currentQuestion + 1;
  const total = s.questions.length;
  const c = COLORS[state.currentSection];
  const bg = BG_COLORS[state.currentSection];
  const progress = ((qNum - 1) / total) * 100;

  // Question body
  let questionBody = '';
  if (q.type === 'text') {
    // Format text question (handle A/B dialogue)
    const linesHtml = q.lines.map(line => {
      // Replace ＿+ with styled blank
      const formatted = line.replace(/＿+/g, `<span style="display:inline-block;border-bottom:2.5px solid ${c};min-width:100px;height:1.2em;vertical-align:bottom;margin:0 3px;"></span>`);
      // Style A: / B: lines
      if (line.startsWith('A：') || line.startsWith('A:')) {
        return `<div style="margin-bottom:10px;"><span style="display:inline-block;background:${c};color:white;font-weight:700;font-size:12px;padding:2px 8px;border-radius:4px;margin-right:8px;">A</span><span style="color:#333;font-size:16px;">${formatted.replace(/^A[：:]\s*/, '')}</span></div>`;
      } else if (line.startsWith('B：') || line.startsWith('B:')) {
        return `<div style="margin-bottom:4px;"><span style="display:inline-block;background:#888;color:white;font-weight:700;font-size:12px;padding:2px 8px;border-radius:4px;margin-right:8px;">B</span><span style="color:#333;font-size:16px;">${formatted.replace(/^B[：:]\s*/, '')}</span></div>`;
      } else {
        return `<div style="color:#222;font-size:17px;line-height:1.8;">${formatted}</div>`;
      }
    }).join('');

    questionBody = `
      <div style="background:#f9fafb;border:1.5px solid #edf0f5;border-radius:12px;padding:22px 20px;margin-bottom:22px;">
        ${linesHtml}
      </div>`;
  } else if (q.type === 'document') {
    questionBody = `
      <div style="border:1.5px solid #dde3f0;border-radius:10px;overflow:hidden;margin-bottom:12px;background:white;max-height:300px;overflow-y:auto;padding:16px 18px;">
        ${q.documentHtml}
      </div>
      <div style="background:#f9fafb;border:1.5px solid #edf0f5;border-radius:10px;padding:13px 16px;margin-bottom:16px;">
        <span style="color:#222;font-size:15px;line-height:1.7;">${q.questionText}</span>
      </div>`;
  } else {
    // Image question
    questionBody = `
      <div style="border:1.5px solid #edf0f5;border-radius:10px;overflow:hidden;margin-bottom:20px;background:#fafafa;">
        <img src="${q.image}" alt="問題" style="width:100%;height:auto;display:block;">
      </div>`;
  }

  // Choice buttons
  const choicesHtml = q.choices.map((ch, i) => {
    const num = i + 1;
    const sel = state.selectedAnswer === num;
    return `
      <button class="choice-btn" data-choice="${num}"
        style="display:flex;align-items:flex-start;width:100%;padding:13px 16px;border:2px solid ${sel ? c : '#e4e9f0'};border-radius:11px;background:${sel ? bg : 'white'};font-size:15px;cursor:pointer;margin-bottom:10px;text-align:left;">
        <span style="display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:50%;background:${sel ? c : '#e8ecf2'};color:${sel ? 'white' : '#666'};font-weight:700;margin-right:12px;font-size:14px;flex-shrink:0;">${num}</span>
        <span style="line-height:1.6;color:#333;padding-top:3px;">${ch}</span>
      </button>`;
  }).join('');

  const canNext = state.selectedAnswer !== null;
  const isLastQ = state.currentQuestion === total - 1;
  const isLastSec = state.currentSection === 2;
  const nextLabel = isLastQ && isLastSec ? '結果を見る ✓' : isLastQ ? '次のセクションへ →' : '次へ →';

  return `
  <div style="min-height:100vh;background:#f0f4f8;padding:20px 0 48px;">
    <div style="background:white;border-radius:20px;padding:24px 24px 28px;width:92%;max-width:700px;margin:0 auto;box-shadow:0 4px 24px rgba(74,111,227,0.10);">

      <!-- Top bar -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;font-weight:700;color:${c};background:${bg};padding:5px 14px;border-radius:20px;">${s.name}</span>
        <span style="font-size:14px;font-weight:600;color:#aaa;">第 <strong style="color:#555;">${qNum}</strong> 問 / ${total}</span>
      </div>

      <!-- Progress -->
      <div style="height:5px;background:#eee;border-radius:3px;margin-bottom:22px;overflow:hidden;">
        <div style="height:100%;width:${progress}%;background:${c};border-radius:3px;transition:width 0.3s;"></div>
      </div>

      ${questionBody}

      <!-- Choices -->
      <div style="margin-bottom:20px;">${choicesHtml}</div>

      <!-- Next -->
      <button id="nextBtn" ${canNext ? '' : 'disabled'}
        style="width:100%;padding:15px;background:${canNext ? c : '#c8d0e0'};color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:${canNext ? 'pointer' : 'not-allowed'};letter-spacing:0.5px;transition:background 0.2s;">
        ${nextLabel}
      </button>
    </div>
  </div>`;
}

// ---------- RESULTS ----------
function renderResults() {
  const total = state.scores.reduce((a, b) => a + b, 0);
  const pct = Math.round(total / 30 * 100);

  let grade, gradeColor;
  if (pct >= 90)      { grade = '優秀 🏆'; gradeColor = '#f5a623'; }
  else if (pct >= 70) { grade = '良好 👍'; gradeColor = '#4a6fe3'; }
  else if (pct >= 50) { grade = '合格 ✅'; gradeColor = '#2eaab8'; }
  else                { grade = 'もう一度頑張ろう 💪'; gradeColor = '#e3714a'; }

  const sectionRows = sections.map((s, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f0f3f8;">
      <div>
        <div style="font-size:14px;font-weight:700;color:#444;">${s.name}</div>
        <div style="font-size:12px;color:#bbb;">${s.description}</div>
      </div>
      <div>
        <span style="font-size:24px;font-weight:800;color:${COLORS[i]};">${state.scores[i]}</span>
        <span style="font-size:14px;color:#bbb;"> / 10</span>
      </div>
    </div>`).join('');

  // Detail: show all 30 answers
  let detailHtml = '';
  sections.forEach((s, si) => {
    const c = COLORS[si];
    detailHtml += `
      <div style="margin-top:20px;">
        <div style="font-size:13px;font-weight:700;color:${c};padding:6px 0;border-bottom:2px solid ${BG_COLORS[si]};margin-bottom:8px;">${s.name}</div>`;
    s.questions.forEach((q, qi) => {
      const userAns = state.answers[si][qi];
      const ok = userAns === q.correct;
      // Get choice text
      const userText = q.choices[userAns - 1] || '—';
      const correctText = q.choices[q.correct - 1];
      detailHtml += `
        <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f5f7fb;align-items:flex-start;">
          <span style="font-size:12px;color:#bbb;min-width:28px;flex-shrink:0;padding-top:2px;">Q${qi+1}</span>
          <span style="font-size:16px;flex-shrink:0;padding-top:1px;">${ok ? '✅' : '❌'}</span>
          <div style="flex:1;font-size:13px;">
            <span style="color:${ok ? '#2eaab8' : '#e3714a'};font-weight:600;">${userAns}. ${userText}</span>
            ${!ok ? `<span style="color:#bbb;"> → 正答: <strong style="color:#2eaab8;">${q.correct}. ${correctText}</strong></span>` : ''}
          </div>
        </div>`;
    });
    detailHtml += `</div>`;
  });

  return `
  <div style="min-height:100vh;background:#f0f4f8;padding:24px 0 56px;">
    <div style="background:white;border-radius:20px;padding:32px 28px;width:92%;max-width:560px;margin:0 auto;box-shadow:0 4px 24px rgba(74,111,227,0.10);">

      <h2 style="text-align:center;font-size:22px;font-weight:800;color:#222;margin-bottom:4px;">テスト結果</h2>
      <div style="text-align:center;font-size:14px;color:#bbb;margin-bottom:28px;">${state.name}（學號：${state.studentId}）</div>

      <div style="background:#f5f7ff;border-radius:16px;padding:26px;text-align:center;margin-bottom:24px;">
        <div style="font-size:64px;font-weight:900;color:#4a6fe3;line-height:1;">${total}</div>
        <div style="font-size:15px;color:#aaa;margin-top:6px;">/ 30 点（正答率 ${pct}%）</div>
        <div style="font-size:18px;font-weight:700;color:${gradeColor};margin-top:14px;">${grade}</div>
      </div>

      <div style="margin-bottom:28px;">${sectionRows}</div>

      <button id="toggleDetail"
        style="width:100%;padding:12px;background:white;color:#4a6fe3;border:2px solid #4a6fe3;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;">
        解答詳細を見る ▼
      </button>

      <div id="detailPanel" style="display:none;margin-bottom:24px;">${detailHtml}</div>

      ${GAS_URL ? `<div id="gasStatus" style="text-align:center;font-size:13px;color:#aaa;margin-bottom:14px;">📤 成績を送信中...</div>` : ''}

      <button id="restartBtn"
        style="width:100%;padding:15px;background:#4a6fe3;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">
        もう一度挑戦する 🔄
      </button>
    </div>
  </div>`;
}

// ===== EVENTS =====
function attachEvents() {
  if (state.screen === 'login') {
    document.getElementById('startBtn').addEventListener('click', startQuiz);
    ['studentId','studentName'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') startQuiz(); })
    );
  }
  if (state.screen === 'section-intro') {
    document.getElementById('startSectionBtn').addEventListener('click', () => {
      state.currentQuestion = 0;
      state.selectedAnswer = null;
      state.screen = 'question';
      render();
    });
  }
  if (state.screen === 'question') {
    document.querySelectorAll('.choice-btn').forEach(btn =>
      btn.addEventListener('click', () => {
        state.selectedAnswer = parseInt(btn.dataset.choice);
        render();
      })
    );
    const nb = document.getElementById('nextBtn');
    if (nb && !nb.disabled) nb.addEventListener('click', advanceQuestion);
  }
  if (state.screen === 'results') {
    document.getElementById('toggleDetail').addEventListener('click', () => {
      const p = document.getElementById('detailPanel');
      const b = document.getElementById('toggleDetail');
      const open = p.style.display === 'none';
      p.style.display = open ? 'block' : 'none';
      b.textContent = open ? '解答詳細を閉じる ▲' : '解答詳細を見る ▼';
    });
    document.getElementById('restartBtn').addEventListener('click', () => {
      state.screen = 'login';
      state.answers = [[],[],[]];
      state.scores = [0,0,0];
      render();
    });
  }
}

function startQuiz() {
  const id = document.getElementById('studentId').value.trim();
  const nm = document.getElementById('studentName').value.trim();
  if (!id || !nm) { alert('學號と姓名を両方入力してください。'); return; }
  state.studentId = id;
  state.name = nm;
  state.currentSection = 0;
  state.currentQuestion = 0;
  state.selectedAnswer = null;
  state.answers = [[],[],[]];
  state.scores = [0,0,0];
  state.screen = 'section-intro';
  render();
}

// ===== GAS 送信 =====
function submitToGAS() {
  if (!GAS_URL) return; // URL 未設定なら何もしない

  // 各問の「解答番号」と「正誤（true/false）」をまとめる
  const detail = sections.map((sec, si) =>
    sec.questions.map((q, qi) => ({
      ans     : state.answers[si][qi] || 0,          // 選んだ番号（未選択=0）
      correct : state.answers[si][qi] === q.correct, // 正誤
      right   : q.correct,                           // 正答番号
    }))
  );

  const payload = {
    studentId : state.studentId,
    name      : state.name,
    scores    : state.scores,
    answers   : state.answers,
    detail    : detail,   // ← 追加：問ごとの詳細
    timestamp : new Date().toISOString(),
  };
  // GAS は CORS を返さないため no-cors で送信
  fetch(GAS_URL, {
    method  : 'POST',
    headers : { 'Content-Type': 'application/json' },
    body    : JSON.stringify(payload),
    mode    : 'no-cors',
  })
  .then(() => {
    const el = document.getElementById('gasStatus');
    if (el) { el.textContent = '✅ 成績を送信しました'; el.style.color = '#2eaab8'; }
  })
  .catch(() => {
    const el = document.getElementById('gasStatus');
    if (el) { el.textContent = '⚠️ 送信に失敗しました（ネットワークを確認してください）'; el.style.color = '#e3714a'; }
  });
}

function advanceQuestion() {
  const q = sections[state.currentSection].questions[state.currentQuestion];
  state.answers[state.currentSection][state.currentQuestion] = state.selectedAnswer;
  if (state.selectedAnswer === q.correct) state.scores[state.currentSection]++;

  const isLastQ  = state.currentQuestion === sections[state.currentSection].questions.length - 1;
  const isLastSec = state.currentSection === 2;

  if (isLastQ) {
    state.screen = isLastSec ? 'results' : 'section-intro';
    if (!isLastSec) state.currentSection++;
  } else {
    state.currentQuestion++;
  }
  state.selectedAnswer = null;
  render();
  window.scrollTo(0, 0);
  // 全問終了時に GAS へ送信
  if (isLastQ && isLastSec) submitToGAS();
}

render();
</script>
</body>
</html>
